name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: go vet ./...
      - run: go test -tags=unit -timeout 2m ./...

  smithy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: Regenerate Smithy artifacts and assert no diff
        run: |
          set -euo pipefail
          nix develop --command make smithy-updates
          if ! git diff --quiet -- api/ clients/typescript/; then
            echo "::error::api/ or clients/typescript/ is out of sync with smithy/models — run 'make smithy-updates' and commit the result"
            git --no-pager diff -- api/ clients/typescript/
            exit 1
          fi
          echo "smithy ok"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build the TypeScript SDK
        working-directory: clients/typescript
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run build

      - name: Install e2e harness deps
        working-directory: e2e/typescript
        run: npm install --no-audit --no-fund

      - name: Run server + SDK-driven e2e tests
        env:
          BANK_SEARCH_PORT: "18080"
          BANK_SEARCH_INDEX_PATH: "/tmp/smoke-index"
          BANK_SEARCH_E2E_BASE_URL: "http://localhost:18080"
        run: |
          set -euo pipefail
          go build -o /tmp/bank-search .
          go run ./cmd/build-index -csv ./cmd/build-index/testdata/sample.csv -out /tmp/smoke-index

          /tmp/bank-search &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT

          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/healthz >/dev/null; then
              ready=1; break
            fi
            sleep 0.5
          done
          [ "$ready" = "1" ] || { echo "server did not become ready"; exit 1; }

          cd e2e/typescript && npm test
