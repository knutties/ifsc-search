name: ifsc-search image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ifsc_tag:
        description: "razorpay/ifsc release tag to bake into the index (blank = latest)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute calver tag
        id: ver
        run: echo "tag=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            IFSC_TAG=${{ inputs.ifsc_tag }}
          tags: |
            ghcr.io/knutties/ifsc-search:${{ steps.ver.outputs.tag }}
            ghcr.io/knutties/ifsc-search:latest
          labels: |
            org.opencontainers.image.title=ifsc-search
            org.opencontainers.image.description=Self-contained HTTP search service for Indian bank branches by IFSC, built on a Bleve index over the razorpay/ifsc CSV release.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.ver.outputs.tag }}
